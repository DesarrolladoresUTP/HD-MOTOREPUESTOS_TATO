<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | Tato Motorepuestos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .text-tato-red { color: #e31b23 !important; }
        .btn-tato-red { background-color: #e31b23; color: white; border: none; }
        .btn-tato-red:hover { background-color: #c8161d; color: white; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">

            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill display-4 text-tato-red"></i>
                <h3 class="fw-bold text-dark mt-2">Nueva Contraseña</h3>
                <p class="text-muted small">Crea una clave segura para tu cuenta web</p>
            </div>

            <div class="card shadow border-0 rounded-4 p-4">
                <form id="formRestablecer">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nueva Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" id="pass1" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Confirmar Nueva Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-check-all"></i></span>
                            <input type="password" id="pass2" class="form-control" placeholder="Repite tu contraseña" required minlength="6">
                        </div>
                        <div id="errorMatch" class="text-danger small mt-1 d-none"><i class="bi bi-x-circle"></i> Las contraseñas no coinciden.</div>
                    </div>

                    <button type="submit" class="btn btn-tato-red w-100 fw-bold py-2">Actualizar mi Contraseña</button>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const tokenVal = urlParams.get('token');

    document.addEventListener("DOMContentLoaded", () => {
        if (!tokenVal || tokenVal.trim() === "") {
            Swal.fire({
                icon: 'error', title: 'Acceso Denegado',
                text: 'El token de recuperación no existe o es inválido.',
                confirmButtonColor: '#e31b23'
            }).then(() => { window.location.href = '/login-cliente.html'; });
        }
    });

    document.getElementById('formRestablecer').addEventListener('submit', async (e) => {
        e.preventDefault();

        const p1 = document.getElementById('pass1').value;
        const p2 = document.getElementById('pass2').value;
        const alertError = document.getElementById('errorMatch');

        if (p1 !== p2) {
            alertError.classList.remove('d-none');
            return;
        } else {
            alertError.classList.add('d-none');
        }

        const btn = e.target.querySelector('button[type="submit"]');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Guardando clave...';
        btn.disabled = true;

        try {
            const response = await fetch(`/api/clientes-web/restablecer-password?token=${encodeURIComponent(tokenVal)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: p1 })
            });

            if (response.ok) {
                Swal.fire({
                    icon: 'success', title: '¡Clave Actualizada!',
                    text: 'Tu contraseña ha sido cambiada con éxito. Ya puedes iniciar sesión.',
                    confirmButtonColor: '#212529'
                }).then(() => {
                    window.location.href = '/login-cliente.html';
                });
            } else {
                const errorMsg = await response.text();
                Swal.fire('Error', errorMsg, 'error');
            }
        } catch (error) {
            Swal.fire('Error', 'No se pudo conectar con el servidor', 'error');
        } finally {
            btn.innerHTML = 'Actualizar mi Contraseña';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
