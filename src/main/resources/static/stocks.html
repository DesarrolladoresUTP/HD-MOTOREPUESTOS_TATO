<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocks - Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        :root { --fondo-app:#f0f9ff;--azul-primario:#0ea5e9;--azul-oscuro:#0369a1;--logo-rojo:#e31b23;--logo-naranja:#f97316; }
        body { background-color:var(--fondo-app); font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        .navbar-custom { background-color:var(--azul-oscuro); box-shadow:0 4px 6px rgba(0,0,0,0.1); }
        .navbar-custom .navbar-brand,.navbar-custom .nav-link { color:#fff; font-weight:500; }
        .navbar-custom .nav-link.active,.navbar-custom .nav-link:hover { color:#38bdf8; }
        .tato-rojo { color:var(--logo-rojo); font-weight:900; margin-right:5px; }
        .casco-logo { color:var(--logo-naranja); }
        .table-custom th { background-color:var(--logo-rojo); color:white; border-bottom:2px solid #b91c1c; }
        .table-custom tbody tr:hover { background-color:rgba(227,27,35,0.05); }
        .foto-producto-tabla { width:40px; height:40px; border-radius:8px; object-fit:cover; border:1px solid #cbd5e1; }
        .alerta-agotado { background-color:rgba(227,27,35,0.1)!important; border-left:4px solid var(--logo-rojo); }
        body {
        animation: fadeIn 0.1s ease-in;
        }
        @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="container-fluid mt-4 px-4 pt-3">
    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h3 style="color:var(--logo-rojo);">
            <i class="bi bi-exclamation-triangle-fill me-2 casco-logo"></i>Alerta de <span class="fw-bold text-dark">Stocks Bajos</span>
        </h3>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-custom mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="text-center" style="width:80px;">Img</th>
                        <th>Cód. Interno</th>
                        <th>Nombre del Producto</th>
                        <th>Categoría</th>
                        <th>Marca</th>
                        <th class="text-center">Stock Actual</th>
                        <th class="text-center">Stock Mínimo</th>
                        <th>Estado de Alerta</th>
                    </tr>
                    </thead>
                    <tbody id="tablaStocksBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/navbar.js?v2"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await initNavbar();
        cargarBajoStock();
    });

    async function cargarBajoStock() {
        try {
            const res = await fetch('/api/productos/bajo-stock');
            const lista = await res.json();
            const tbody = document.getElementById('tablaStocksBody');
            tbody.innerHTML = '';

            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-success fw-bold py-4"><i class="bi bi-check-circle-fill me-2"></i>Todos los productos tienen stock saludable.</td></tr>';
                return;
            }

            lista.forEach(inv => {
                const p = inv.producto;

                // MODIFICADO: Validación y manejo correcto de la URL de la imagen (Cloudinary o Local)
                let urlImg = `https://ui-avatars.com/api/?name=${encodeURIComponent(p.nombre.charAt(0))}&background=e31b23&color=fff&rounded=true`;

                if (p.imagen) {
                    if (p.imagen.startsWith('http://') || p.imagen.startsWith('https://')) {
                        // Si la base de datos ya guarda la URL completa (ej. Cloudinary), la usamos directo
                        urlImg = p.imagen;
                    } else {
                        // Si la base de datos solo guarda el nombre del archivo (sistema local antiguo)
                        urlImg = `/uploads/${p.imagen}`;
                    }
                }

                const agotado = inv.stock <= 0;
                const badge = agotado
                    ? '<span class="badge bg-danger"><i class="bi bi-x-octagon-fill me-1"></i>Agotado</span>'
                    : '<span class="badge bg-warning text-dark"><i class="bi bi-exclamation-circle-fill me-1"></i>Por agotarse</span>';
                const badgeStock = agotado
                    ? `<span class="badge bg-danger fs-6">${inv.stock}</span>`
                    : `<span class="badge bg-warning text-dark fs-6">${inv.stock}</span>`;
                const tr = document.createElement('tr');
                if (agotado) tr.className = 'alerta-agotado';
                tr.innerHTML = `
                    <td class="text-center"><img src="${urlImg}" class="foto-producto-tabla shadow-sm" alt="Img" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.nombre.charAt(0))}&background=e31b23&color=fff&rounded=true'"></td>
                    <td class="fw-bold text-muted font-monospace">${p.codigoInterno}</td>
                    <td class="fw-bold" style="color:var(--azul-oscuro);">${p.nombre}</td>
                    <td>${p.categoria ? p.categoria.nombre : '-'}</td>
                    <td>${p.marca}</td>
                    <td class="text-center">${badgeStock}</td>
                    <td class="text-center"><span class="badge bg-secondary fs-6">${inv.stockMinimo}</span></td>
                    <td>${badge}</td>`;
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error("Error al cargar stocks bajos:", e);
        }
    }
</script>
</body>
</html>
