<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Caja - Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        :root { --fondo-app:#f0f9ff;--azul-primario:#0ea5e9;--azul-oscuro:#0369a1;--logo-rojo:#e31b23; }
        body { background-color:var(--fondo-app); font-family:'Segoe UI',sans-serif; animation: fadeIn 0.2s ease-in; }
        .panel-caja { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 30px; text-align: center; }
        .icon-huge { font-size: 4rem; margin-bottom: 15px; }
        .table-custom th { background-color:var(--azul-oscuro); color:white; border-bottom:2px solid var(--azul-primario); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="container mt-4 pt-3 mb-5">
    <h3 style="color:var(--azul-oscuro);" class="mb-4">
        <i class="bi bi-cash-register me-2 text-primary"></i>Gestión de <span style="color:var(--logo-rojo); font-weight:900;">Caja</span>
    </h3>

    <div class="row mb-5">
        <div class="col-md-6 mx-auto" id="panelAccionCaja">
            <div class="panel-caja border-top border-4 border-secondary">
                <i class="bi bi-arrow-repeat icon-huge text-secondary spin"></i>
                <h4 class="fw-bold">Cargando estado...</h4>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 fw-bold text-secondary"><i class="bi bi-clock-history me-2"></i>Historial de Turnos</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-custom mb-0 align-middle text-center">
                    <thead>
                    <tr>
                        <th>Estado</th>
                        <th>Apertura</th>
                        <th>Cierre</th>
                        <th>Monto Inicial</th>
                        <th>Ventas Efectivo</th>
                        <th>Real Contado</th>
                        <th>Diferencia</th>
                    </tr>
                    </thead>
                    <tbody id="tablaHistorialBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/navbar.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await initNavbar();
        verificarEstadoCaja();
        cargarHistorial();
    });

    async function verificarEstadoCaja() {
        try {
            const res = await fetch('/api/caja/estado');
            const caja = await res.json();
            const panel = document.getElementById('panelAccionCaja');

            if (caja.estado === 'CERRADA') {
                panel.innerHTML = `
                    <div class="panel-caja border-top border-4 border-danger">
                        <i class="bi bi-lock-fill icon-huge text-danger"></i>
                        <h3 class="fw-bold text-dark mb-1">Caja Cerrada</h3>
                        <p class="text-muted mb-4">Aperture la caja para empezar a cobrar.</p>
                        <div class="input-group input-group-lg mb-3 mx-auto" style="max-width: 300px;">
                            <span class="input-group-text bg-light fw-bold">S/</span>
                            <input type="number" id="inputMontoInicial" class="form-control text-center fw-bold" placeholder="Sencillo Inicial" min="0" step="0.10">
                        </div>
                        <button class="btn btn-lg btn-success fw-bold w-100" style="max-width: 300px;" onclick="abrirCaja()">
                            <i class="bi bi-unlock-fill me-2"></i> Abrir Caja
                        </button>
                    </div>`;
            } else {
                panel.innerHTML = `
                    <div class="panel-caja border-top border-4 border-success">
                        <i class="bi bi-unlock-fill icon-huge text-success"></i>
                        <h3 class="fw-bold text-dark mb-1">Caja Abierta</h3>
                        <p class="text-success fw-bold mb-4">Operando desde: ${new Date(caja.fechaApertura).toLocaleString('es-PE')}</p>

                        <div class="bg-light p-3 rounded mb-4 text-start">
                            <div class="d-flex justify-content-between mb-2"><span>Sencillo Inicial:</span> <strong class="fs-5">S/ ${caja.montoInicial.toFixed(2)}</strong></div>
                            <div class="d-flex justify-content-between text-muted"><small>No olvide contar el efectivo físico antes de cerrar.</small></div>
                        </div>

                        <button class="btn btn-lg btn-danger fw-bold w-100" style="max-width: 300px;" onclick="modalCerrarCaja()">
                            <i class="bi bi-lock-fill me-2"></i> Cerrar Caja
                        </button>
                    </div>`;
            }
        } catch (e) {
            Swal.fire('Error', 'No se pudo conectar con el servidor', 'error');
        }
    }

    async function abrirCaja() {
        const monto = document.getElementById('inputMontoInicial').value;
        if (!monto || monto < 0) { Swal.fire('Atención', 'Ingrese un monto inicial válido.', 'warning'); return; }

        Swal.fire({ title: 'Abriendo...', didOpen: () => Swal.showLoading() });
        try {
            const res = await fetch('/api/caja/abrir', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ montoInicial: monto }) });
            if (res.ok) { Swal.fire('¡Éxito!', 'Caja aperturada correctamente.', 'success'); verificarEstadoCaja(); cargarHistorial(); }
            else Swal.fire('Error', await res.text(), 'error');
        } catch (e) {}
    }

    async function modalCerrarCaja() {
        const { value: formValues } = await Swal.fire({
            title: 'Cerrar Turno de Caja',
            html: `
                <label class="form-label fw-bold mt-2">Dinero Físico Contado (Efectivo)</label>
                <input id="swal-monto" type="number" class="form-control form-control-lg text-center fw-bold mb-3" placeholder="S/ 0.00" min="0" step="0.10">
                <label class="form-label fw-bold">Observaciones (Opcional)</label>
                <textarea id="swal-obs" class="form-control" rows="2" placeholder="Ej: Faltan 5 soles por error de vuelto"></textarea>
            `,
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonColor: '#e31b23',
            confirmButtonText: 'Cerrar Definitivamente',
            preConfirm: () => {
                return { monto: document.getElementById('swal-monto').value, obs: document.getElementById('swal-obs').value }
            }
        });

        if (formValues) {
            if (!formValues.monto || formValues.monto < 0) { Swal.fire('Atención', 'Ingrese el monto físico contado.', 'warning'); return; }

            try {
                const res = await fetch('/api/caja/cerrar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ montoReal: formValues.monto, observaciones: formValues.obs }) });
                if (res.ok) { Swal.fire('Caja Cerrada', 'El turno ha finalizado.', 'success'); verificarEstadoCaja(); cargarHistorial(); }
                else Swal.fire('Error', await res.text(), 'error');
            } catch (e) {}
        }
    }

    async function cargarHistorial() {
        try {
            const res = await fetch('/api/caja/historial');
            const data = await res.json();
            const tbody = document.getElementById('tablaHistorialBody');
            tbody.innerHTML = '';

            data.forEach(c => {
                const badge = c.estado === 'ABIERTA' ? '<span class="badge bg-success">ABIERTA</span>' : '<span class="badge bg-secondary">CERRADA</span>';
                const cierre = c.fechaCierre ? new Date(c.fechaCierre).toLocaleString('es-PE') : '---';

                let difHtml = '---';
                if (c.estado === 'CERRADA') {
                    if (c.diferencia == 0) difHtml = '<span class="badge bg-success text-white">S/ 0.00 (Cuadre Exacto)</span>';
                    else if (c.diferencia > 0) difHtml = `<span class="badge bg-primary text-white">S/ +${c.diferencia.toFixed(2)} (Sobra)</span>`;
                    else difHtml = `<span class="badge bg-danger text-white">S/ ${c.diferencia.toFixed(2)} (Falta)</span>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${badge}</td>
                        <td class="text-muted">${new Date(c.fechaApertura).toLocaleString('es-PE')}</td>
                        <td class="text-muted">${cierre}</td>
                        <td class="fw-bold">S/ ${c.montoInicial.toFixed(2)}</td>
                        <td class="fw-bold text-success">S/ ${c.ingresosEfectivo ? c.ingresosEfectivo.toFixed(2) : '0.00'}</td>
                        <td class="fw-bold text-primary">S/ ${c.montoFinalReal ? c.montoFinalReal.toFixed(2) : '---'}</td>
                        <td>${difHtml}</td>
                    </tr>
                `;
            });
        } catch (e) {}
    }
</script>
</body>
</html>
