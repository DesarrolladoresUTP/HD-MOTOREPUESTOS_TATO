<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos | Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --tato-primary: #e31b23; --tato-secondary: #212529; --fondo-app: #f8f9fa; }
        body { background-color: var(--fondo-app); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-tato-dark { background-color: var(--tato-secondary) !important; }
        .text-tato-red { color: var(--tato-primary) !important; }

        .pedido-card { border: none; border-radius: 12px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .pedido-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

        .estado-badge { font-size: 0.85rem; padding: 0.5rem 1rem; border-radius: 50px; font-weight: bold; }
        .detalle-producto { font-size: 0.9rem; color: #6c757d; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-tato-dark shadow-sm py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center fw-bold m-0" href="/tienda">
            <i class="bi bi-person-helmet fs-3 me-2 text-tato-red"></i>
            <span class="text-tato-red me-1">TATO</span> <span class="fw-light text-white">MOTOREPUESTOS</span>
        </a>
        <a href="/tienda" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-bold">
            <i class="bi bi-shop me-1"></i> Seguir Comprando
        </a>
    </div>
</nav>

<div class="container mb-5 flex-grow-1">
    <h3 class="fw-bold mb-4" style="color: var(--tato-secondary);">
        <i class="bi bi-bag-check-fill text-tato-red me-2"></i>Historial de Mis Pedidos
    </h3>

    <div id="contenedorMisPedidos" class="row g-4">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-danger"></div>
            <p class="mt-3 text-muted">Buscando tus órdenes...</p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/navbar.js?v12"></script>
<script>
    let pedidosCache = [];

    document.addEventListener("DOMContentLoaded", async () => {
        const config = JSON.parse(localStorage.getItem('tato_web_config'));
        if (config) {
            document.documentElement.style.setProperty('--tato-primary', config.colorPrimario);
            document.documentElement.style.setProperty('--tato-secondary', config.colorSecundario);
        }
        await cargarMisPedidos();
    });

    function generarBarraEstado(estado) {
        const pasos = ['Confirmando Pago', 'PENDIENTE', 'EN_PREPARACION', 'ENVIADO', 'ENTREGADO'];
        const pasoLabels = ['Pago', 'Recibido', 'Preparando', 'En camino', 'Entregado'];
        if (estado === 'CANCELADO') {
            return `<div class="mt-2 mb-3">
                <div class="progress" style="height:6px">
                    <div class="progress-bar bg-danger" style="width:100%"></div>
                </div>
                <small class="text-danger fw-bold">Pedido cancelado</small>
            </div>`;
        }
        let indexActual = pasos.indexOf(estado);
        if (estado === 'LISTO_RECOJO') indexActual = 3;
        const porcentaje = indexActual < 0 ? 10 : Math.round(((indexActual + 1) / pasos.length) * 100);
        return `<div class="mt-2 mb-3">
            <div class="progress mb-1" style="height:6px; border-radius:3px;">
                <div class="progress-bar bg-danger" role="progressbar" style="width:${porcentaje}%;"></div>
            </div>
            <div class="d-flex justify-content-between">
                ${pasoLabels.map((label, i) => `
                    <small class="fw-bold" style="font-size:0.60rem; color:${i <= indexActual ? '#e31b23' : '#adb5bd'}">${label}</small>
                `).join('')}
            </div>
        </div>`;
    }

    function abrirDetallePedido(id) {
        const p = pedidosCache.find(x => x.id === id);
        if (!p) return;
        const fecha = new Date(p.fechaPedido).toLocaleString('es-PE', {
            day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        const detallesHTML = p.detalles.map(d => `
            <tr>
                <td class="text-start">${d.nombreProducto}</td>
                <td class="text-center">${d.cantidad}</td>
                <td class="text-end">S/ ${parseFloat(d.precioUnitario).toFixed(2)}</td>
                <td class="text-end fw-bold">S/ ${parseFloat(d.subtotal).toFixed(2)}</td>
            </tr>
        `).join('');
        const sucursalInfo = p.sucursalNombre
            ? `<p class="mb-1"><small class="text-muted">Sucursal: <strong>${p.sucursalNombre}</strong></small></p>`
            : '';
        Swal.fire({
            title: `<strong>Orden #000${p.id}</strong>`,
            width: 640,
            html: `
                <div class="text-start" style="font-size:0.95rem;">
                    <div class="mb-3 p-3 rounded" style="background:#f8f9fa;">
                        <p class="mb-1"><small class="text-muted">Fecha: <strong>${fecha}</strong></small></p>
                        <p class="mb-1"><small class="text-muted">Entrega: <strong>${p.metodoEntrega === 'DELIVERY' ? '🚚 Delivery' : '🏪 Retiro en tienda'}</strong></small></p>
                        ${sucursalInfo}
                        ${p.direccionEntrega ? `<p class="mb-0"><small class="text-muted">Dirección: <strong>${p.direccionEntrega}</strong></small></p>` : ''}
                    </div>
                    <table class="table table-sm table-bordered">
                        <thead class="table-light">
                            <tr>
                                <th>Producto</th>
                                <th class="text-center">Cant.</th>
                                <th class="text-end">P.U.</th>
                                <th class="text-end">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>${detallesHTML}</tbody>
                    </table>
                    <div class="text-end fw-bold fs-5">Total: <span style="color:#e31b23;">S/ ${parseFloat(p.total).toFixed(2)}</span></div>
                </div>
            `,
            confirmButtonColor: '#e31b23',
            showDenyButton: true,
            denyButtonText: '<i class="bi bi-file-earmark-pdf"></i> Descargar Boleta',
            denyButtonColor: '#198754',
            confirmButtonText: 'Cerrar',
            customClass: { htmlContainer: 'text-start' }
        }).then((result) => {
            if (result.isDenied) {
                window.open(`/api/pedidos-web/${p.id}/boleta-pdf`, '_blank');
            }
        });
    }

    async function cargarMisPedidos() {
        const contenedor = document.getElementById('contenedorMisPedidos');
        try {
            const res = await fetch('/api/pedidos-web/mis-pedidos');
            if (res.status === 401) {
                window.location.href = '/login-cliente';
                return;
            }
            if (!res.ok) throw new Error("Error al cargar pedidos");
            const pedidos = await res.json();
            pedidosCache = pedidos;
            contenedor.innerHTML = '';
            if (pedidos.length === 0) {
                contenedor.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="bi bi-bag-x display-1 text-muted mb-3 d-block"></i>
                        <h4 class="text-muted fw-bold">Aún no tienes pedidos</h4>
                        <p class="text-secondary">Explora nuestra tienda y encuentra los mejores repuestos para tu moto.</p>
                        <a href="/tienda" class="btn btn-danger fw-bold px-4 rounded-pill mt-2">Ir al Catálogo</a>
                    </div>`;
                return;
            }
            pedidos.forEach(p => {
                const fecha = new Date(p.fechaPedido).toLocaleDateString('es-PE', {
                    day: '2-digit', month: '2-digit', year: 'numeric'
                });

                let colorEstado = 'bg-dark text-white', iconoEstado = 'bi-cash-coin', textoEstado = 'Pendiente de Revisión';
                if (p.estado === 'PENDIENTE') { colorEstado = 'bg-warning text-dark'; iconoEstado = 'bi-hourglass-split'; textoEstado = 'Pago Confirmado'; }
                if (p.estado === 'EN_PREPARACION') { colorEstado = 'bg-info text-dark'; iconoEstado = 'bi-box-seam'; textoEstado = 'Empacando tu pedido'; }
                if (p.estado === 'LISTO_RECOJO')   { colorEstado = 'bg-primary text-white'; iconoEstado = 'bi-shop'; textoEstado = '¡Listo para recoger!'; }
                if (p.estado === 'ENVIADO')         { colorEstado = 'bg-secondary text-white'; iconoEstado = 'bi-truck'; textoEstado = 'En camino'; }
                if (p.estado === 'ENTREGADO')       { colorEstado = 'bg-success text-white'; iconoEstado = 'bi-check-circle-fill'; textoEstado = 'Entregado'; }
                if (p.estado === 'CANCELADO')       { colorEstado = 'bg-danger text-white'; iconoEstado = 'bi-x-circle-fill'; textoEstado = 'Cancelado'; }

                const detallesHTML = p.detalles.map(d =>
                    `<div class="detalle-producto mb-1"><i class="bi bi-dot"></i> ${d.cantidad}x ${d.nombreProducto} (S/ ${parseFloat(d.subtotal).toFixed(2)})</div>`
                ).join('');

                contenedor.innerHTML += `
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card pedido-card h-100 p-4" style="cursor:pointer" onclick="abrirDetallePedido(${p.id})">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h5 class="fw-bold mb-0">Orden #000${p.id}</h5>
                                    <small class="text-muted"><i class="bi bi-calendar3 me-1"></i>${fecha}</small>
                                </div>
                                <span class="badge bg-light text-dark border">
                                    ${p.metodoEntrega === 'DELIVERY' ? '<i class="bi bi-truck me-1"></i>Delivery' : '<i class="bi bi-shop me-1"></i>Tienda'}
                                </span>
                            </div>
                            <div class="mb-3 border-start border-3 border-danger ps-3 py-1">${detallesHTML}</div>
                            ${generarBarraEstado(p.estado)}
                            <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small fw-bold text-uppercase">Total</div>
                                    <div class="fs-5 fw-bold text-dark">S/ ${parseFloat(p.total).toFixed(2)}</div>
                                </div>
                                <span class="estado-badge ${colorEstado}">
                                    <i class="bi ${iconoEstado} me-1"></i>${textoEstado}
                                </span>
                            </div>
                            <div class="text-center mt-3">
                                <small class="text-muted" style="font-size:0.75rem;"><i class="bi bi-eye me-1"></i>Toca para ver detalles</small>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (error) {
            contenedor.innerHTML = '<div class="alert alert-danger w-100 text-center fw-bold">Hubo un problema al cargar tus pedidos.</div>';
        }
    }
</script>
</body>
</html>
