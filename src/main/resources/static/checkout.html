<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --tato-primary: #e31b23; --tato-secondary: #212529; --fondo-app: #f4f6f8; }
        body { background-color: var(--fondo-app); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; animation: fadeIn 0.3s ease-in; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-tato-dark { background-color: var(--tato-secondary) !important; }
        .text-tato-red { color: var(--tato-primary) !important; }
        .btn-tato-red { background-color: var(--tato-primary); color: white; border: none; }
        .btn-tato-red:hover { opacity: 0.9; color: white; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-tato-dark { background-color: var(--tato-secondary); color: white; border: none; }
        .btn-tato-dark:hover { background-color: #000; color: white; }
        .card-custom { border-radius: 1rem; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .form-control, .form-select { border-radius: 0.5rem; padding: 0.6rem 1rem; border-color: #dee2e6; }
        .form-control:focus, .form-select:focus { border-color: var(--tato-primary); box-shadow: 0 0 0 0.25rem rgba(227, 27, 35, 0.25); }
        .resumen-caja { background-color: #fff; border-radius: 1rem; border: 2px dashed #e9ecef; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-tato-dark shadow-sm py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center fw-bold m-0" href="/tienda.html">
            <i class="bi bi-person-helmet fs-3 me-2 text-tato-red"></i>
            <span class="text-tato-red me-1">TATO</span> <span class="fw-light text-white">MOTOREPUESTOS</span>
        </a>
        <a href="/tienda.html" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-bold">
            <i class="bi bi-arrow-left me-1"></i> Volver a la Tienda
        </a>
    </div>
</nav>

<div class="container mb-5 flex-grow-1">
    <div class="row mb-4">
        <div class="col-12 text-center">
            <h2 class="fw-bold" style="color: var(--tato-secondary);">Finaliza tu Pedido</h2>
            <p class="text-muted">Estás a un paso de tener tus repuestos listos</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-lg-7">
            <div class="card card-custom p-4 p-md-5 h-100">
                <h4 class="mb-4 fw-bold pb-3 border-bottom" style="color: var(--tato-secondary);">
                    <i class="bi bi-person-vcard text-tato-red me-2"></i>Datos de Facturación y Envío
                </h4>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Comprobante</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-receipt text-muted"></i></span>
                            <select class="form-select border-start-0 ps-0" id="tipoDocumento" onchange="ajustarFormularioDoc()">
                                <option value="DNI">Boleta (DNI)</option>
                                <option value="RUC">Factura (RUC)</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary small text-uppercase" id="lblDocumento">N° Documento</label>
                        <div class="input-group shadow-sm rounded-3">
                            <input type="text" class="form-control border-end-0" id="numDocumento" maxlength="8" placeholder="Ingresa el número">
                            <button class="btn btn-tato-dark fw-bold px-3" type="button" id="btnValidarDoc" onclick="consultarDocumentoPeruanos()">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold text-secondary small text-uppercase" id="lblNombreCompleto">Nombre Completo / Razón Social</label>
                        <input type="text" class="form-control bg-light fw-bold" id="nombreResultado" readonly placeholder="Se autocompletará al validar el documento">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Teléfono de Contacto</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0"
                                   id="telefonoCliente"
                                   placeholder="Ej: 999999999"
                                   maxlength="9"
                                   oninput="this.value=this.value.replace(/\D/g,'').slice(0,9)">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Método de Entrega</label>
                        <div class="d-flex gap-3 mt-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="metodoEntrega" id="entregaTienda" value="RETIRO_TIENDA" checked onchange="toggleDireccion()">
                                <label class="form-check-label fw-bold" for="entregaTienda">
                                    <i class="bi bi-shop me-1"></i> Retiro en Tienda
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="metodoEntrega" id="entregaDelivery" value="DELIVERY" onchange="toggleDireccion()">
                                <label class="form-check-label fw-bold" for="entregaDelivery">
                                    <i class="bi bi-truck me-1"></i> Delivery
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="col-12" id="containerSucursales">
                        <label class="form-label fw-bold text-secondary small text-uppercase">
                            <i class="bi bi-shop me-1"></i>Elegir Sucursal de Retiro
                        </label>
                        <div id="listaSucursales" class="mt-2">
                            <!-- se llena dinámicamente -->
                        </div>
                    </div>

                    <div class="col-12" id="containerDireccion" style="display: none;">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Dirección de Entrega</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-geo-alt text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="direccionCliente" placeholder="Avenida, Calle, Distrito, Referencia...">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-5">
            <div class="card card-custom p-4 p-md-5 bg-white h-100">
                <h5 class="fw-bold text-dark mb-4 pb-2 border-bottom">Tu Carrito</h5>
                <div id="listaProductosCheckout" class="mb-4 flex-grow-1 overflow-auto" style="max-height: 300px; padding-right: 5px;"></div>

                <div class="resumen-caja p-3 mb-4">
                    <div class="d-flex justify-content-between fw-bold fs-3 align-items-center">
                        <span class="text-secondary fs-5">Total a Pagar:</span>
                        <span class="text-tato-red" id="totalCheckout">S/ 0.00</span>
                    </div>
                </div>

                <button class="btn btn-tato-red w-100 btn-lg fw-bold shadow-sm d-flex justify-content-center align-items-center" id="btnFinalizarPedido" onclick="procesarPedidoFinal()" disabled>
                    <i class="bi bi-shield-lock fs-5 me-2"></i> Confirmar Pedido Seguro
                </button>
                <div class="text-center mt-3"><small class="text-muted"><i class="bi bi-lock-fill text-success me-1"></i> Transacción protegida y cifrada.</small></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const config = JSON.parse(localStorage.getItem('tato_web_config'));
        if (config) {
            document.documentElement.style.setProperty('--tato-primary', config.colorPrimario);
            document.documentElement.style.setProperty('--tato-secondary', config.colorSecundario);
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/checkout.js?v13"></script>
</body>
</html>
