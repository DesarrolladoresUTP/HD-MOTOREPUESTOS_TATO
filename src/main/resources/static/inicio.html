<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        :root { --fondo-app:#f0f9ff;--azul-primario:#0ea5e9;--azul-oscuro:#0369a1;--azul-hover:#38bdf8;--logo-rojo:#e31b23;--logo-naranja:#f97316; }
        body { background-color:var(--fondo-app); font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        .navbar-custom { background-color:var(--azul-oscuro); box-shadow:0 4px 6px rgba(0,0,0,0.1); }
        .navbar-custom .navbar-brand,.navbar-custom .nav-link { color:#fff; font-weight:500; }
        .navbar-custom .nav-link:hover,.navbar-custom .nav-link.active { color:var(--azul-hover); }
        .tato-rojo { color:var(--logo-rojo); font-weight:900; margin-right:5px; }
        .casco-logo { color:var(--logo-naranja); }
        .dashboard-placeholder { border:2px dashed #cbd5e1; background-color:transparent; border-radius:15px; padding:4rem 2rem; text-align:center; color:#64748b; transition:all 0.3s ease; }
        .dashboard-placeholder:hover { border-color:var(--azul-primario); background-color:rgba(255,255,255,0.5); }
        body {
        animation: fadeIn 0.1s ease-in;
        }
        @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="container mt-5 pt-3">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold" style="color:var(--azul-oscuro);">Resumen General</h2>
            <p class="text-muted">Bienvenido al sistema. Aquí podrás monitorear el rendimiento de tu negocio.</p>
        </div>
    </div>
    <div class="row mt-2">
        <div class="col-12">
            <div class="dashboard-placeholder">
                <i class="bi bi-bar-chart-line" style="font-size:4rem;color:#94a3b8;"></i>
                <h3 class="mt-3" style="color:#475569;">Métricas y Gráficos Próximamente</h3>
                <p class="mb-0">Este espacio está listo para albergar el análisis de ventas y reportes financieros.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/navbar.js?v1"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await initNavbar();
        verificarBajoStock();
    });

    async function verificarBajoStock() {
        try {
            const res = await fetch('/api/productos/bajo-stock');
            if (res.ok) {
                const lista = await res.json();
                if (lista.length > 0) {
                    Swal.fire({
                        toast:true, position:'bottom-end', icon:'warning',
                        title:'¡Alerta de Stock!',
                        text:`Tienes ${lista.length} producto(s) con stock bajo.`,
                        showConfirmButton:true, confirmButtonText:'Revisar',
                        confirmButtonColor:'#f97316', timer:8000
                    }).then(r => { if (r.isConfirmed) window.location.href = '/stocks'; });
                }
            }
        } catch (e) {}
    }
</script>
</body>
</html>
