<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración Web - Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        :root { --fondo-app:#f0f9ff; --azul-primario:#0ea5e9; --azul-oscuro:#0369a1; --logo-rojo:#e31b23; --logo-naranja:#f97316; }
        body { background-color: var(--fondo-app); font-family: 'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; animation: fadeIn 0.1s ease-in; }
        .tato-rojo { color: var(--logo-rojo); font-weight: 900; margin-right: 5px; }
        .casco-logo { color: var(--logo-naranja); }
        .card-header-custom { background-color: var(--azul-oscuro); color: white; border-radius: 8px 8px 0 0 !important; }
        .list-group-item.active { background-color: var(--azul-oscuro); border-color: var(--azul-oscuro); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="container-fluid mt-4 px-4 pt-3">
    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h3 style="color:var(--azul-oscuro);">
            <i class="bi bi-globe me-2 casco-logo"></i>Configuración <span class="tato-rojo">Web</span>
        </h3>
        <button class="btn btn-success fw-bold" onclick="guardarConfiguracion()">
            <i class="bi bi-save me-1"></i> Guardar Todos los Cambios
        </button>
    </div>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="list-group shadow-sm border-0 rounded-3">
                <button class="list-group-item list-group-item-action active fw-bold py-3" data-bs-toggle="list" data-bs-target="#panelBanner"><i class="bi bi-image me-2"></i>Banner Principal</button>
                <button class="list-group-item list-group-item-action fw-bold py-3" data-bs-toggle="list" data-bs-target="#panelColores"><i class="bi bi-palette me-2"></i>Apariencia y Colores</button>
                <button class="list-group-item list-group-item-action fw-bold py-3" data-bs-toggle="list" data-bs-target="#panelContacto"><i class="bi bi-telephone me-2"></i>Redes y Contacto</button>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card shadow-sm border-0 rounded-3 h-100">
                <div class="card-body p-4 tab-content">

                    <div class="tab-pane fade show active" id="panelBanner">
                        <h5 class="fw-bold mb-4" style="color: var(--azul-oscuro);">Textos del Banner de Inicio</h5>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Título Principal</label>
                            <input type="text" class="form-control form-control-lg" id="txtTitulo" placeholder="Ej: Los Mejores Repuestos para tu Moto">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Subtítulo</label>
                            <input type="text" class="form-control" id="txtSubtitulo" placeholder="Ej: Calidad, garantía y velocidad en envíos">
                        </div>
                    </div>

                    <div class="tab-pane fade" id="panelColores">
                        <h5 class="fw-bold mb-4" style="color: var(--azul-oscuro);">Colores de la Tienda Virtual</h5>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Color Primario (Botones y Detalles)</label>
                                <div class="d-flex align-items-center gap-3">
                                    <input type="color" class="form-control form-control-color" id="colorPrimario" value="#e31b23" title="Elige tu color rojo/primario">
                                    <span class="text-muted small">Por defecto: Rojo Tato (#e31b23)</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Color Secundario (Barra superior)</label>
                                <div class="d-flex align-items-center gap-3">
                                    <input type="color" class="form-control form-control-color" id="colorSecundario" value="#212529" title="Elige tu color oscuro/secundario">
                                    <span class="text-muted small">Por defecto: Gris Oscuro (#212529)</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="panelContacto">
                        <h5 class="fw-bold mb-4" style="color: var(--azul-oscuro);">Enlaces de Redes Sociales (Pie de página)</h5>
                        <div class="mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-whatsapp text-success me-1"></i> Número de WhatsApp</label>
                            <input type="text" class="form-control" id="linkWa" placeholder="Ej: 51999999999">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-facebook text-primary me-1"></i> Link de Facebook</label>
                            <input type="text" class="form-control" id="linkFb" placeholder="https://facebook.com/tato">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-instagram text-danger me-1"></i> Link de Instagram</label>
                            <input type="text" class="form-control" id="linkIg" placeholder="https://instagram.com/tato">
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/navbar.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        await initNavbar();
        cargarConfiguracionActual();
    });

    function cargarConfiguracionActual() {
        const config = JSON.parse(localStorage.getItem('tato_web_config')) || {
            titulo: 'Los Mejores Repuestos para tu Moto',
            subtitulo: 'Calidad, garantía y velocidad en Motorepuestos Tato',
            colorPrimario: '#e31b23', colorSecundario: '#212529',
            whatsapp: '', facebook: '', instagram: ''
        };

        document.getElementById('txtTitulo').value = config.titulo;
        document.getElementById('txtSubtitulo').value = config.subtitulo;
        document.getElementById('colorPrimario').value = config.colorPrimario;
        document.getElementById('colorSecundario').value = config.colorSecundario;
        document.getElementById('linkWa').value = config.whatsapp;
        document.getElementById('linkFb').value = config.facebook;
        document.getElementById('linkIg').value = config.instagram;
    }

    function guardarConfiguracion() {
        const config = {
            titulo: document.getElementById('txtTitulo').value.trim(),
            subtitulo: document.getElementById('txtSubtitulo').value.trim(),
            colorPrimario: document.getElementById('colorPrimario').value,
            colorSecundario: document.getElementById('colorSecundario').value,
            whatsapp: document.getElementById('linkWa').value.trim(),
            facebook: document.getElementById('linkFb').value.trim(),
            instagram: document.getElementById('linkIg').value.trim()
        };

        localStorage.setItem('tato_web_config', JSON.stringify(config));

        Swal.fire({
            icon: 'success', title: '¡Guardado!',
            text: 'Los cambios ya están reflejados en la tienda pública.',
            confirmButtonColor: '#0ea5e9'
        });
    }
</script>
</body>
</html>
