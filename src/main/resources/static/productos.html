<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Maestro - Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        :root { --fondo-app:#f0f9ff;--azul-primario:#0ea5e9;--azul-oscuro:#0369a1;--azul-hover:#38bdf8;--logo-rojo:#e31b23;--logo-naranja:#f97316; }
        body { background-color:var(--fondo-app); font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; animation: fadeIn 0.1s ease-in; }
        .navbar-custom { background-color:var(--azul-oscuro); box-shadow:0 4px 6px rgba(0,0,0,0.1); }
        .tato-rojo { color:var(--logo-rojo); font-weight:900; margin-right:5px; }
        .casco-logo { color:var(--logo-naranja); }
        .table-custom th { background-color:var(--azul-oscuro); color:white; border-bottom:2px solid var(--azul-primario); }
        .table-custom tbody tr:hover { background-color:rgba(14,165,233,0.05); }
        .producto-inactivo { opacity:0.6; filter:grayscale(80%); background-color:#f8f9fa; }
        .foto-producto-tabla { width:40px; height:40px; border-radius:8px; object-fit:cover; border:1px solid #cbd5e1; }
        .foto-variante-mini { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; margin-right: 5px; border: 1px solid #ccc; }
        .badge-stock { font-size: 0.75rem; margin-left: 5px; padding: 2px 5px; border-radius: 4px; background-color: #e2e8f0; color: #334155; border: 1px solid #cbd5e1;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="container-fluid mt-4 px-4 pt-3">
    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h3 style="color:var(--azul-oscuro);">
            <i class="bi bi-box-fill me-2 casco-logo"></i>Catálogo de <span class="tato-rojo">Productos</span>
        </h3>
        <button class="btn btn-primary fw-bold" onclick="abrirModalNuevo()">
            <i class="bi bi-plus-circle me-1"></i> Nuevo Producto
        </button>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-custom mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="text-center" style="width:170px;">Acciones</th>
                        <th>Img</th>
                        <th>Cód. Interno</th>
                        <th>Nombre y Modelos</th>
                        <th>Categoría</th>
                        <th>Marca</th>
                        <th>P. Venta</th>
                        <th>Estado</th>
                    </tr>
                    </thead>
                    <tbody id="tablaProductosBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalProducto" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header" style="background-color:var(--azul-oscuro);color:white;">
                <h5 class="modal-title fw-bold" id="tituloModal"><i class="bi bi-box-seam me-2"></i>Ficha del Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body bg-light">
                <form id="formProducto">
                    <input type="hidden" id="inventarioId">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Cód. Interno</label>
                            <input type="text" class="form-control bg-light text-muted fw-bold" id="codigoInterno" readonly>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Nombre del Repuesto</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Ej. Destornillador Reversible" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Categoría</label>
                            <select class="form-select" id="categoriaId" required>
                                <option value="" selected disabled>Cargando categorías...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Marca</label>
                            <input type="text" class="form-control" id="marca" placeholder="Ej. LS2, Motul" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Precio de Venta (S/)</label>
                            <input type="number" id="precioVenta" class="form-control" min="0" step="0.01">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Imagen General</label>
                            <input class="form-control" type="file" id="imagen" accept="image/*">
                        </div>

                        <!-- NUEVA ESTRUCTURA DE VARIANTES (SIN CAMPO DE STOCK) -->
                        <div class="col-12 mt-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label fw-bold mb-0" style="color:var(--azul-oscuro)">
                                    <i class="bi bi-images me-1"></i>Modelos / Variantes (Opcional)
                                </label>
                                <button type="button" class="btn btn-sm btn-outline-primary" onclick="agregarFilaVariante()">
                                    <i class="bi bi-plus-lg"></i> Añadir Modelo
                                </button>
                            </div>
                            <div class="alert alert-info small py-2 mb-2"><i class="bi bi-info-circle me-1"></i>Las cantidades (Stock) de estos modelos se regulan exclusivamente desde el módulo de <b>Almacén</b>.</div>
                            <div id="contenedorVariantesList" class="p-3 bg-white border rounded">
                                <!-- Las filas se insertarán aquí con JavaScript -->
                            </div>
                        </div>

                        <!-- STOCK GENERAL (Por si no hay variantes) -->
                        <!-- NOTA: Se mantiene la lógica de que el stock general no se llena al crear si hay variantes,
                             pero incluso el stock general ya no debería pedirse al crear. Nace en 0 y se ajusta en Almacén.
                             Sin embargo, por compatibilidad con la creación de productos simples sin modelos,
                             podemos dejarlo o quitarlo. Lo ideal arquitectónicamente es quitarlo también
                             y que todo nazca en 0, pero lo dejaré solo oculto visualmente si hay variantes como estaba,
                             o directamente solo pedimos Stock Mínimo.
                             Vamos a dejar SOLO el Stock Mínimo.
                        -->
                        <div class="col-md-12 mt-3">
                            <label class="form-label fw-bold text-danger">Stock Mínimo (Alerta General)</label>
                            <input type="number" class="form-control w-50" id="stockMinimoGeneral" min="1" value="5">
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold text-secondary">Descripción Técnica</label>
                            <textarea class="form-control" id="descripcion" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-light border-top-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success fw-bold" onclick="guardarProducto()">
                    <i class="bi bi-save me-1"></i> <span id="textoBtnGuardar">Guardar Ficha</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/navbar.js"></script>
<script>
    let modalProducto;
    let inventarioGlobal = [];

    document.addEventListener('DOMContentLoaded', async () => {
        await initNavbar();
        modalProducto = new bootstrap.Modal(document.getElementById('modalProducto'), { focus: false });
        cargarCategoriasSelect();
        cargarProductos();
    });

    // ==========================================
    // LÓGICA DE VARIANTES (SIN STOCK AL CREAR)
    // ==========================================
    function agregarFilaVariante(nombre = '', urlImg = '') {
        const container = document.getElementById('contenedorVariantesList');
        const div = document.createElement('div');
        div.className = 'row g-2 mb-2 align-items-center fila-variante pb-2 border-bottom';

        let miniImg = urlImg ? `<img src="${urlImg}" class="foto-variante-mini" alt="v">` : '';

        div.innerHTML = `
            <div class="col-md-5">
                <label class="form-label text-muted small fw-bold mb-1">Nombre Variante</label>
                <input type="text" class="form-control form-control-sm var-nombre" placeholder="Ej. Punta Plana" value="${nombre}">
                <input type="hidden" class="var-url" value="${urlImg}">
            </div>
            <div class="col-md-6">
                <label class="form-label text-muted small fw-bold mb-1 d-block">Imagen (Opcional)</label>
                <div class="d-flex align-items-center">
                    ${miniImg}
                    <input type="file" class="form-control form-control-sm var-img" accept="image/*">
                </div>
            </div>
            <div class="col-md-1 text-end">
                <label class="form-label d-block mb-1">&nbsp;</label>
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removerFilaVariante(this)"><i class="bi bi-trash"></i></button>
            </div>
        `;
        container.appendChild(div);
    }

    function removerFilaVariante(btn) {
        btn.closest('.fila-variante').remove();
    }
    // ==========================================

    async function cargarCategoriasSelect() {
        try {
            const res = await fetch('/api/categorias/activas');
            if (res.ok) {
                const cats = await res.json();
                const sel = document.getElementById('categoriaId');
                sel.innerHTML = '<option value="" selected disabled>Seleccione...</option>';
                cats.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
            }
        } catch (e) {}
    }

    async function cargarProductos() {
        try {
            const res = await fetch('/api/productos');
            inventarioGlobal = await res.json();
            const tbody = document.getElementById('tablaProductosBody');
            tbody.innerHTML = '';

            if (inventarioGlobal.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">El catálogo está vacío.</td></tr>';
                return;
            }

            inventarioGlobal.forEach(inv => {
                const p = inv.producto;
                const urlImg = p.imagen ? p.imagen : `https://ui-avatars.com/api/?name=${encodeURIComponent(p.nombre.charAt(0))}&background=0ea5e9&color=fff`;
                const inactivo = !inv.activo;
                const badge = inv.activo ? '<span class="badge bg-success">Activo</span>' : '<span class="badge bg-secondary">Inactivo</span>';
                const nombre = p.nombre.replace(/'/g, "\'");

                // Muestra las variantes creadas
                let htmlVariantes = '';
                if (p.variantes && Array.isArray(p.variantes) && p.variantes.length > 0) {
                    htmlVariantes = `<div class="mt-1 d-flex flex-wrap gap-1">`;
                    p.variantes.forEach(v => {
                        let miniatura = v.imagen ? `<img src="${v.imagen}" class="foto-variante-mini">` : '';
                        let stockBadge = `<span class="badge-stock fw-bold">${v.stock} u.</span>`;
                        htmlVariantes += `<span class="badge bg-light text-dark border border-secondary-subtle d-flex align-items-center">${miniatura}${v.nombre}${stockBadge}</span>`;
                    });
                    htmlVariantes += `<div class="w-100 mt-1 small text-primary fw-bold"><i class="bi bi-boxes me-1"></i>Total en Almacén: ${inv.stock} unidades</div>`;
                } else {
                    htmlVariantes = `<div class="mt-1 small text-primary fw-bold"><i class="bi bi-box-seam me-1"></i>Stock: ${inv.stock} unidades</div>`;
                }

                let botones = `<button class="btn btn-outline-dark" onclick="imprimirEtiquetaQR('${p.codigoInterno}','${nombre}')" title="QR"><i class="bi bi-qr-code"></i></button>`;
                if (inv.activo) {
                    botones += `
                        <button class="btn btn-outline-primary" onclick="abrirModalEditar(${inv.id})"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-outline-warning" onclick="cambiarEstado(${inv.id},'${nombre}',false)"><i class="bi bi-pause-circle"></i></button>
                        <button class="btn btn-outline-danger" onclick="eliminarProducto(${inv.id},'${nombre}')"><i class="bi bi-trash"></i></button>`;
                } else {
                    botones += `<button class="btn btn-outline-success" onclick="cambiarEstado(${inv.id},'${nombre}',true)"><i class="bi bi-play-circle"></i></button>
                        <button class="btn btn-outline-danger" onclick="eliminarProducto(${inv.id},'${nombre}')"><i class="bi bi-trash"></i></button>`;
                }

                const tr = document.createElement('tr');
                if (inactivo) tr.className = 'producto-inactivo';
                tr.innerHTML = `
                    <td class="text-center"><div class="btn-group btn-group-sm">${botones}</div></td>
                    <td><img src="${urlImg}" class="foto-producto-tabla" alt="Img"></td>
                    <td class="fw-bold text-muted">${p.codigoInterno}</td>
                    <td><strong style="color:var(--azul-oscuro);">${p.nombre}</strong>${htmlVariantes}</td>
                    <td>${p.categoria ? p.categoria.nombre : '-'}</td>
                    <td>${p.marca}</td>
                    <td class="text-success fw-bold">S/ ${inv.precioVenta.toFixed(2)}</td>
                    <td>${badge}</td>`;
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error("Error cargando productos:", e);
        }
    }

    function abrirModalNuevo() {
        document.getElementById('formProducto').reset();
        document.getElementById('inventarioId').value = '';
        document.getElementById('codigoInterno').value = 'Auto-generado';
        document.getElementById('contenedorVariantesList').innerHTML = '';

        document.getElementById('tituloModal').innerHTML = '<i class="bi bi-box-seam me-2"></i>Registrar Nuevo Producto';
        document.getElementById('textoBtnGuardar').innerText = 'Guardar Ficha';
        modalProducto.show();
    }

    async function abrirModalEditar(inventarioId) {
        const inv = inventarioGlobal.find(i => i.id === inventarioId);
        if (!inv) return;
        const p = inv.producto;

        document.getElementById('inventarioId').value = inv.id;
        document.getElementById('codigoInterno').value = p.codigoInterno;
        document.getElementById('nombre').value = p.nombre;
        document.getElementById('marca').value = p.marca;
        document.getElementById('descripcion').value = p.descripcion || '';
        document.getElementById('precioVenta').value = inv.precioVenta;
        document.getElementById('stockMinimoGeneral').value = inv.stockMinimo;

        if (p.categoria) document.getElementById('categoriaId').value = p.categoria.id;

        document.getElementById('contenedorVariantesList').innerHTML = '';
        if (p.variantes && Array.isArray(p.variantes) && p.variantes.length > 0) {
            // Nota: Aquí ya no pasamos el stock al editar.
            p.variantes.forEach(v => agregarFilaVariante(v.nombre, v.imagen || ''));
        }

        document.getElementById('tituloModal').innerHTML = '<i class="bi bi-pencil-square me-2"></i>Editar Ficha del Producto';
        document.getElementById('textoBtnGuardar').innerText = 'Actualizar Ficha';
        modalProducto.show();
    }

    async function guardarProducto() {
        const inventarioId = document.getElementById('inventarioId').value;
        const nombre = document.getElementById('nombre').value.trim();
        const categoriaId = document.getElementById('categoriaId').value;
        const marca = document.getElementById('marca').value.trim();
        const precioVenta = document.getElementById('precioVenta').value;
        const stockMinimo = document.getElementById('stockMinimoGeneral').value;

        if (!nombre || !categoriaId || !marca || !precioVenta) {
            Swal.fire({ icon: 'warning', title: 'Campos Incompletos' }); return;
        }

        Swal.fire({ title: 'Procesando información...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('categoriaId', categoriaId);
        formData.append('marca', marca);
        formData.append('precioVenta', precioVenta);
        formData.append('descripcion', document.getElementById('descripcion').value.trim());

        // El stock inicial será 0 implícitamente por el Backend al no enviar el campo 'stock'
        if(stockMinimo) {
             formData.append('stockMinimo', stockMinimo);
        }

        const imagenInput = document.getElementById('imagen');
        if (imagenInput.files.length > 0) formData.append('imagen', imagenInput.files[0]);

        // Procesar listas de variantes sin mandar stock
        const filasNombres = document.querySelectorAll('.var-nombre');
        const filasUrls = document.querySelectorAll('.var-url');
        const filasImgs = document.querySelectorAll('.var-img');

        filasNombres.forEach((input, index) => {
            formData.append('variantesNombres', input.value.trim());
            // Como ya no pedimos stock, enviamos 0 (o nulo, pero el backend espera Integer).
            // Esto asegura que al crear el producto sus variantes nazcan con 0 stock.
            // Si es edición, el backend (ProductoService) ya tiene una lógica para conservar el stock actual.
            formData.append('variantesStocks', 0);
            formData.append('variantesUrls', filasUrls[index].value || 'null');

            if (filasImgs[index].files.length > 0) {
                formData.append('variantesImagenes', filasImgs[index].files[0]);
            } else {
                formData.append('variantesImagenes', new Blob([""], { type: "text/plain" }), "empty.txt");
            }
        });

        const url = inventarioId ? `/api/productos/${inventarioId}` : '/api/productos';
        const metodo = inventarioId ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, { method: metodo, body: formData });
            if (res.ok) {
                modalProducto.hide();
                await cargarProductos();
                Swal.fire({ title: inventarioId ? 'Actualizado' : 'Creado', icon: 'success', timer: 1500, showConfirmButton: false });
            } else {
                const err = await res.text();
                Swal.fire({ icon: 'error', title: 'Error', text: err });
            }
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'Error de conexión' });
        }
    }

    function cambiarEstado(id, nom, act) { fetch(`/api/productos/${id}/estado?activo=${act}`,{method:'PUT'}).then(()=>cargarProductos()); }
    function eliminarProducto(id, nom) { fetch(`/api/productos/${id}`,{method:'DELETE'}).then(()=>cargarProductos()); }
    function imprimirEtiquetaQR(codigo, nombre) {
        const pw = window.open('', '', 'width=350,height=400');
        pw.document.write(`<html><head><title>QR ${codigo}</title><style>body{text-align:center;font-family:sans-serif;padding:20px;}.sticker{display:inline-block;padding:15px;border:2px dashed #000;border-radius:10px;min-width:180px;}.titulo{font-weight:bold;margin-bottom:10px;}#qrcode{display:flex;justify-content:center;margin:10px 0;}.codigo{font-size:18px;font-weight:900;letter-spacing:2px;}</style></head><body><div class="sticker"><div class="titulo">${nombre.length > 25 ? nombre.substring(0,25)+'...' : nombre}</div><div id="qrcode"></div><div class="codigo">${codigo}</div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><script>new QRCode(document.getElementById("qrcode"),{text:"${codigo}",width:120,height:120});setTimeout(()=>{window.print();window.close();},500);<\/script></body></html>`);
        pw.document.close();
    }
</script>
</body>
</html>
