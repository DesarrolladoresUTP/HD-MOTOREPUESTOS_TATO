<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        :root { --fondo-app:#f0f9ff; --azul-oscuro:#0369a1; --logo-rojo:#e31b23; --logo-naranja:#f97316; }
        body { background-color:var(--fondo-app); font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { background:white; border-radius:15px; box-shadow:0 10px 25px rgba(3,105,161,0.1); padding:40px 30px; width:100%; max-width:400px; }
        .logo-container { text-align:center; margin-bottom:30px; }
        .casco-logo { color:var(--logo-naranja); font-size:3rem; }
        .tato-rojo { color:var(--logo-rojo); font-weight:900; font-size:2.5rem; letter-spacing:-1px; }
        .texto-motorepuestos { color:var(--azul-oscuro); font-weight:700; font-size:1rem; display:block; margin-top:-10px; }
        .form-control:focus,.form-select:focus { border-color:var(--logo-naranja); box-shadow:0 0 0 0.25rem rgba(249,115,22,0.25); }
        .btn-ingresar { background-color:var(--logo-rojo); color:white; font-weight:bold; padding:12px; border:none; transition:all 0.3s; }
        .btn-ingresar:hover { background-color:#c8161d; transform:translateY(-2px); }
        body {
        animation: fadeIn 0.1s ease-in;
        }
        @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-container">
        <i class="bi bi-person-helmet casco-logo"></i>
        <div>
            <span class="tato-rojo">TATO</span>
            <span class="texto-motorepuestos">MOTOREPUESTOS</span>
        </div>
    </div>
    <form id="formLogin">
        <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Usuario (Correo):</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                <input type="email" class="form-control" id="correo" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold text-secondary">Contraseña:</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold text-secondary">Local:</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-shop"></i></span>
                <select class="form-select" id="local" required>
                    <option value="" selected disabled>Cargando locales...</option>
                </select>
            </div>
        </div>
        <button type="button" class="btn btn-ingresar w-100" onclick="iniciarSesion()">
            INGRESAR AL SISTEMA
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.addEventListener('DOMContentLoaded', cargarSucursales);

    async function cargarSucursales() {
        try {
            const res = await fetch('/api/sucursales/activas');
            if (res.ok) {
                const sucursales = await res.json();
                const sel = document.getElementById('local');
                if (sucursales.length === 0) {
                    sel.innerHTML = '<option value="" disabled>No hay locales activos</option>';
                    return;
                }
                sel.innerHTML = '<option value="" selected disabled>Seleccione su local...</option>';
                sucursales.forEach(s => {
                    const o = document.createElement('option');
                    o.value = s.id;
                    o.textContent = s.nombre;
                    sel.appendChild(o);
                });
            }
        } catch (e) {}
    }

    async function iniciarSesion() {
        const correo   = document.getElementById('correo').value;
        const password = document.getElementById('password').value;
        const local    = document.getElementById('local').value;
        if (!correo || !password || !local) {
            Swal.fire({ icon:'warning', title:'Datos Incompletos', text:'Ingrese usuario, contraseña y local.', confirmButtonColor:'#e31b23' });
            return;
        }
        try {
            const res = await fetch('/api/auth/login', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ correo, password, local })
            });
            if (res.ok) {
                window.location.href = '/inicio';
            } else {
                Swal.fire({ icon:'error', title:'Acceso Denegado', text:'Credenciales incorrectas.', confirmButtonColor:'#e31b23' });
            }
        } catch (e) {}
    }

    document.getElementById('password').addEventListener('keypress', e => {
        if (e.key === 'Enter') iniciarSesion();
    });
</script>
</body>
</html>
