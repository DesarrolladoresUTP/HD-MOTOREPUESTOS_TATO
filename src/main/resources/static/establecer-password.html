<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Establecer Contraseña - Motorepuestos Tato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        :root { --fondo-app:#f0f9ff; --azul-oscuro:#0369a1; --logo-rojo:#e31b23; --logo-naranja:#f97316; }
        body { background-color:var(--fondo-app); font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; height:100vh; display:flex; align-items:center; justify-content:center; animation: fadeIn 0.1s ease-in; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
        .login-card { background:white; border-radius:15px; box-shadow:0 10px 25px rgba(3,105,161,0.1); padding:40px 30px; width:100%; max-width:400px; }
        .logo-container { text-align:center; margin-bottom:30px; }
        .casco-logo { color:var(--logo-naranja); font-size:3rem; }
        .tato-rojo { color:var(--logo-rojo); font-weight:900; font-size:2.5rem; letter-spacing:-1px; }
        .texto-motorepuestos { color:var(--azul-oscuro); font-weight:700; font-size:1rem; display:block; margin-top:-10px; }
        .subtitulo-accion { color:var(--azul-oscuro); font-size:0.95rem; font-weight:600; margin-top:8px; display:block; }
        .form-control:focus { border-color:var(--logo-naranja); box-shadow:0 0 0 0.25rem rgba(249,115,22,0.25); }
        .btn-confirmar { background-color:var(--logo-rojo); color:white; font-weight:bold; padding:12px; border:none; transition:all 0.3s; }
        .btn-confirmar:hover { background-color:#c8161d; color:white; transform:translateY(-2px); }
        .btn-confirmar:disabled { background-color:#aaa; transform:none; }
        .strength-bar-wrap { height:5px; border-radius:3px; background:#e9ecef; margin-top:6px; }
        .strength-bar { height:5px; border-radius:3px; transition:all 0.3s; width:0%; }
    </style>
</head>
<body>
<div class="login-card">

    <!-- Logo igual al login -->
    <div class="logo-container">
        <i class="bi bi-person-helmet casco-logo"></i>
        <div>
            <span class="tato-rojo">TATO</span>
            <span class="texto-motorepuestos">MOTOREPUESTOS</span>
        </div>
        <span class="subtitulo-accion" id="subtitulo">Establecer contraseña</span>
    </div>

    <!-- Token inválido -->
    <div id="bloqueInvalido" class="text-center py-2" style="display:none;">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
        <h6 class="mt-3 text-danger fw-bold">Enlace inválido o expirado</h6>
        <p class="text-muted small">Este enlace ya fue utilizado o han pasado más de 24 horas.</p>
        <a href="/login" class="btn btn-confirmar w-100 mt-1">Ir al inicio de sesión</a>
    </div>

    <!-- Formulario -->
    <div id="bloqueFormulario">
        <div class="mb-3">
            <label class="form-label fw-bold text-secondary" id="labelPassword">Nueva contraseña:</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password"
                       placeholder="Mínimo 8 caracteres" oninput="evaluarFuerza()">
                <button class="btn btn-outline-secondary" type="button" onclick="toggleVer('password', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="strength-bar-wrap">
                <div id="barraFuerza" class="strength-bar"></div>
            </div>
            <small id="textoFuerza" class="text-muted"></small>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold text-secondary">Confirmar contraseña:</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" id="passwordConfirm"
                       placeholder="Repite la contraseña">
                <button class="btn btn-outline-secondary" type="button" onclick="toggleVer('passwordConfirm', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button class="btn btn-confirmar w-100" onclick="guardar()" id="btnGuardar">
            CONFIRMAR CONTRASEÑA
        </button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const tipo   = window.location.pathname.includes('activar') ? 'activacion' : 'reset';

    document.getElementById('subtitulo').textContent =
        tipo === 'activacion' ? 'Activa tu cuenta' : 'Restablece tu contraseña';
    document.getElementById('labelPassword').textContent =
        tipo === 'activacion' ? 'Elige tu contraseña:' : 'Nueva contraseña:';

    (async () => {
        try {
            const r = await fetch(`/api/token/validar?token=${token}&tipo=${tipo}`);
            if (!r.ok) mostrarInvalido();
        } catch { mostrarInvalido(); }
    })();

    function mostrarInvalido() {
        document.getElementById('bloqueFormulario').style.display = 'none';
        document.getElementById('bloqueInvalido').style.display  = 'block';
    }

    function toggleVer(id, btn) {
        const input = document.getElementById(id);
        const esTexto = input.type === 'text';
        input.type = esTexto ? 'password' : 'text';
        btn.innerHTML = esTexto ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
    }

    function evaluarFuerza() {
        const val   = document.getElementById('password').value;
        const barra = document.getElementById('barraFuerza');
        const texto = document.getElementById('textoFuerza');
        let puntos  = 0;
        if (val.length >= 8)          puntos++;
        if (/[A-Z]/.test(val))        puntos++;
        if (/[0-9]/.test(val))        puntos++;
        if (/[^A-Za-z0-9]/.test(val)) puntos++;
        const niveles = [
            { pct:'0%',   color:'',        label:'' },
            { pct:'25%',  color:'#ef4444', label:'Débil' },
            { pct:'50%',  color:'#f97316', label:'Regular' },
            { pct:'75%',  color:'#eab308', label:'Buena' },
            { pct:'100%', color:'#22c55e', label:'Fuerte' },
        ];
        const n = niveles[puntos];
        barra.style.width      = n.pct;
        barra.style.background = n.color;
        texto.textContent      = n.label;
        texto.style.color      = n.color;
    }

    async function guardar() {
        const pw  = document.getElementById('password').value;
        const pw2 = document.getElementById('passwordConfirm').value;

        if (pw.length < 8) {
            Swal.fire({ icon:'warning', title:'Contraseña muy corta',
                        text:'Debe tener al menos 8 caracteres.', confirmButtonColor:'#e31b23' });
            return;
        }
        if (pw !== pw2) {
            Swal.fire({ icon:'warning', title:'Las contraseñas no coinciden',
                        confirmButtonColor:'#e31b23' });
            return;
        }

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Guardando...';

        try {
            const r = await fetch('/api/token/establecer-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password: pw, tipo })
            });
            const data = await r.json();
            if (r.ok) {
                await Swal.fire({
                    icon: 'success',
                    title: tipo === 'activacion' ? '¡Cuenta activada!' : '¡Contraseña restablecida!',
                    text: 'Ahora puedes iniciar sesión.',
                    confirmButtonColor: '#e31b23',
                    confirmButtonText: 'Ir al inicio de sesión'
                });
                window.location.href = '/login';
            } else {
                Swal.fire({ icon:'error', title:'Error',
                            text: data.error || 'No se pudo guardar.',
                            confirmButtonColor:'#e31b23' });
                btn.disabled = false;
                btn.innerHTML = 'CONFIRMAR CONTRASEÑA';
            }
        } catch {
            Swal.fire({ icon:'error', title:'Error de conexión', confirmButtonColor:'#e31b23' });
            btn.disabled = false;
            btn.innerHTML = 'CONFIRMAR CONTRASEÑA';
        }
    }
</script>
</body>
</html>
