<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Categorías - Motorepuestos Tato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <style>
    :root {
        --fondo-app: #f0f9ff; --azul-primario: #0ea5e9;
        --azul-oscuro: #0369a1; --azul-hover: #38bdf8;
        --logo-rojo: #e31b23; --logo-naranja: #f97316;
    }
    body { background-color: var(--fondo-app); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .navbar-custom { background-color: var(--azul-oscuro); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .navbar-custom .navbar-brand, .navbar-custom .nav-link { color: #fff; font-weight: 500; }
    .navbar-custom .nav-link.active, .navbar-custom .nav-link:hover { color: var(--azul-hover); }
    .tato-rojo { color: var(--logo-rojo); font-weight: 900; margin-right: 5px; }
    .casco-logo { color: var(--logo-naranja); }
    .table-custom th { background-color: var(--azul-oscuro); color: white; border-bottom: 2px solid var(--azul-primario); }
    .table-custom tbody tr:hover { background-color: rgba(14,165,233,0.05); }
    .item-inactivo { opacity: 0.6; filter: grayscale(80%) blur(0.5px); background-color: #f8f9fa; }
    body {
    animation: fadeIn 0.1s ease-in;
    }
    @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="container mt-4 pt-3">
  <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
    <h3 style="color:var(--azul-oscuro);">
      <i class="bi bi-tags-fill me-2 casco-logo"></i>Gestión de <span class="tato-rojo">Categorías</span>
    </h3>
    <button class="btn btn-primary" onclick="abrirModalNuevo()">
      <i class="bi bi-plus-circle me-1"></i> Nueva Categoría
    </button>
  </div>
  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-custom mb-0 align-middle text-center">
          <thead>
          <tr>
            <th style="width:150px;">Acciones</th>
            <th class="text-start">Nombre de Categoría</th>
            <th class="text-start">Descripción</th>
            <th>Estado</th>
          </tr>
          </thead>
          <tbody id="tablaCategoriasBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalCategoria" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background-color:var(--azul-oscuro);color:white;">
        <h5 class="modal-title" id="tituloModal"><i class="bi bi-tag me-2"></i>Registrar Categoría</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light">
        <form id="formCategoria">
          <input type="hidden" id="categoriaId">
          <div class="mb-3">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ej. Cascos, Aceites..." required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Descripción</label>
            <textarea class="form-control" id="descripcion" rows="3" placeholder="Opcional"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" onclick="guardarCategoria()">
          <i class="bi bi-save me-1"></i> <span id="textoBtnGuardar">Guardar</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/navbar.js?v8"></script>
<script>
  let modalCategoria;

  document.addEventListener('DOMContentLoaded', async () => {
      await initNavbar();
      modalCategoria = new bootstrap.Modal(document.getElementById('modalCategoria'));
      cargarCategorias();
  });

  async function cargarCategorias() {
      try {
          const res = await fetch('/api/categorias');
          const data = await res.json();
          const tbody = document.getElementById('tablaCategoriasBody');
          tbody.innerHTML = '';
          if (data.length === 0) {
              tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No hay categorías registradas.</td></tr>';
              return;
          }
          data.forEach(item => {
              const inactivo = !item.activo;
              const badge = item.activo
                  ? '<span class="badge bg-success">Activo</span>'
                  : '<span class="badge bg-secondary">Inactivo</span>';
              let botones = item.activo
                  ? `<button class="btn btn-outline-primary" onclick="abrirModalEditar(${item.id})"><i class="bi bi-pencil-square"></i></button>
                     <button class="btn btn-outline-warning" onclick="cambiarEstado(${item.id},'${item.nombre}',false)"><i class="bi bi-pause-circle"></i></button>
                     <button class="btn btn-outline-danger" onclick="eliminarCategoria(${item.id},'${item.nombre}')"><i class="bi bi-trash"></i></button>`
                  : `<button class="btn btn-outline-success" onclick="cambiarEstado(${item.id},'${item.nombre}',true)"><i class="bi bi-play-circle"></i></button>
                     <button class="btn btn-outline-danger" onclick="eliminarCategoria(${item.id},'${item.nombre}')"><i class="bi bi-trash"></i></button>`;
              const tr = document.createElement('tr');
              if (inactivo) tr.className = 'item-inactivo';
              tr.innerHTML = `
                  <td><div class="btn-group btn-group-sm">${botones}</div></td>
                  <td class="text-start fw-bold" style="color:var(--azul-oscuro);">${item.nombre}</td>
                  <td class="text-start">${item.descripcion || '-'}</td>
                  <td>${badge}</td>`;
              tbody.appendChild(tr);
          });
      } catch (e) {}
  }

  function abrirModalNuevo() {
      document.getElementById('formCategoria').reset();
      document.getElementById('categoriaId').value = '';
      document.getElementById('tituloModal').innerHTML = '<i class="bi bi-tag me-2"></i>Registrar Nueva Categoría';
      document.getElementById('textoBtnGuardar').innerText = 'Guardar';
      modalCategoria.show();
  }

  async function abrirModalEditar(id) {
      try {
          const res = await fetch(`/api/categorias/${id}`);
          if (res.ok) {
              const item = await res.json();
              document.getElementById('categoriaId').value = item.id;
              document.getElementById('nombre').value = item.nombre;
              document.getElementById('descripcion').value = item.descripcion || '';
              document.getElementById('tituloModal').innerHTML = '<i class="bi bi-pencil-square me-2"></i>Editar Categoría';
              document.getElementById('textoBtnGuardar').innerText = 'Actualizar';
              modalCategoria.show();
          }
      } catch (e) {}
  }

  async function guardarCategoria() {
      const id = document.getElementById('categoriaId').value;
      const nombre = document.getElementById('nombre').value.trim();
      const descripcion = document.getElementById('descripcion').value.trim();
      if (!nombre) {
          Swal.fire({ icon: 'warning', title: 'Falta Nombre', confirmButtonColor: '#0ea5e9' });
          return;
      }
      try {
          const res = await fetch(id ? `/api/categorias/${id}` : '/api/categorias', {
              method: id ? 'PUT' : 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ nombre, descripcion })
          });
          if (res.ok) {
              modalCategoria.hide();
              cargarCategorias();
              Swal.fire({ icon: 'success', title: 'Guardado', showConfirmButton: false, timer: 1500 });
          } else {
              const err = await res.text();
              Swal.fire({ icon: 'error', title: 'Error', text: err || 'El nombre ya existe.' });
          }
      } catch (e) {}
  }

  function cambiarEstado(id, nombre, activar) {
      Swal.fire({
          title: activar ? '¿Reactivar?' : '¿Desactivar?',
          text: `Se cambiará el estado de "${nombre}".`,
          icon: activar ? 'info' : 'warning',
          showCancelButton: true,
          confirmButtonColor: activar ? '#198754' : '#f59e0b',
          cancelButtonColor: '#6c757d',
          confirmButtonText: activar ? 'Sí, reactivar' : 'Sí, desactivar'
      }).then(async result => {
          if (result.isConfirmed) {
              try {
                  const res = await fetch(`/api/categorias/${id}/estado?activo=${activar}`, { method: 'PUT' });
                  if (res.ok) cargarCategorias();
                  else { const err = await res.text(); Swal.fire({ icon: 'error', title: 'Error', text: err }); }
              } catch (e) {}
          }
      });
  }

  function eliminarCategoria(id, nombre) {
      Swal.fire({
          title: '¿Desactivar categoría?',
          text: `"${nombre}" se marcará como inactiva. No se puede eliminar si tiene productos asignados.`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#e31b23',
          cancelButtonColor: '#6c757d',
          confirmButtonText: 'Sí, desactivar'
      }).then(async result => {
          if (result.isConfirmed) {
              try {
                  const res = await fetch(`/api/categorias/${id}`, { method: 'DELETE' });
                  if (res.ok) cargarCategorias();
                  else { const err = await res.text(); Swal.fire({ icon: 'error', title: 'No se puede eliminar', text: err }); }
              } catch (e) {}
          }
      });
  }
</script>
</body>
</html>
